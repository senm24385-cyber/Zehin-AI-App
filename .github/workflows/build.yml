name: Build APK
on: [push, workflow_dispatch]
jobs:
  android-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build System
        run: |
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android
          mkdir -p www && echo "<html><body><h1>Zehin AI</h1></body></html>" > www/index.html
          npx cap init "Zehin AI" "com.zehin.ai" --web-dir www
          npx cap add android
          
      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Zehin-AI-App
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
