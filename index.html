<!DOCTYPE html>
<html>
<head>
    <title>Zehin AI Self-Build</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
</head>
<body style="margin:0; padding:20px; font-family:sans-serif; text-align:center; background:#121212; color:white;">
    
    <div id="dynamic-app" style="margin-top:50px;">
        <h2>Zehin AI Janlanýar...</h2>
        <p>Firebase-den täze buýruklara garaşylýar.</p>
    </div>

    <script>
        // Siziň Firebase Database Linkiňiz
        const firebaseConfig = {
            databaseURL: "https://zehin-ai-default-rtdb.europe-west1.firebasedatabase.app/" 
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Firebase-däki 'app_code' öýjügine gulak salýarys
        db.ref('app_code').on('value', (snapshot) => {
            const newCode = snapshot.val();
            if(newCode) {
                // Firebase-den gelen kody göni ekrana çykarýar
                document.getElementById('dynamic-app').innerHTML = newCode;
            }
        });
    </script>
</body>
</html>
